name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/driveshare

jobs:
  # ── Build & Test .NET Services ─────────────────────────────
  build-dotnet:
    name: Build & Test .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CarRental.sln

      - name: Build
        run: dotnet build CarRental.sln --no-restore -c Release

      - name: Test
        run: dotnet test CarRental.sln --no-build -c Release --verbosity normal

  # ── Build & Test Frontend ──────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build
        run: npm run build

  # ── Docker Build & Push ────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    needs: [build-dotnet, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: user-service
            path: src/services/UserService
          - name: listing-service
            path: src/services/ListingService
          - name: booking-service
            path: src/services/BookingService
          - name: payment-service
            path: src/services/PaymentService
          - name: notification-service
            path: src/services/NotificationService
          - name: review-service
            path: src/services/ReviewService
          - name: frontend
            path: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}

  # ── Deploy to Azure ────────────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy services to Container Apps
        run: |
          for svc in user-service listing-service booking-service payment-service notification-service review-service frontend; do
            az containerapp update \
              --name $svc \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$svc:${{ github.sha }}
          done
