server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/users/ { proxy_pass http://user-service:80/api/users/; }
    location /api/listings/ { proxy_pass http://listing-service:80/api/listings/; }
    location /api/bookings/ { proxy_pass http://booking-service:80/api/bookings/; }
    location /api/payments/ { proxy_pass http://payment-service:80/api/payments/; }
    location /api/reviews/ { proxy_pass http://review-service:80/api/reviews/; }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
